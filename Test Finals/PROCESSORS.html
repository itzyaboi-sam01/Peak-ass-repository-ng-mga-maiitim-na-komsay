<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BantayStocks LTD - Not so authorized stock checker for your Komsay needs</title>

    <link rel="icon" type="image/x-icon" href="icon1.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700&family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="itemgrids.css">
</head>

<body>

    <!-- NAVBAR -->
<header class="navbar">

    <div class="logo">
        <nav>
            <a href="homepage.html">
                <img src="logo.png" alt="BantayStocks Logo">
            </a>
        </nav>

        <p>For Komsays by Komsays</p>
    </div>

    <input type="text"
           placeholder="⌕ Search for components..."
           class="search-bar">

    <div class="nav-actions">

        <div class="login-register">
            <span class="small-text">Login or</span>
            <span class="reg">REGISTER</span>
        </div>

        <div class="divider"></div>

        <!-- CART -->
        <div class="cart">
            <img src="shoppingcart.png" alt="Cart Icon">
            <span id="cart-count">Cart</span>
        </div>

    </div>

    <!-- Sliding Cart -->
    <div id="cart-tab" class="cart-tab">
        <div class="cart-header">
            <h2>Your Shopping Cart</h2>
            <span class="close-cart" onclick="toggleCart()">CLOSE</span>
        </div>

        <ul id="cart-items-list" class="cart-items-list">
            <!-- Items injected here -->
        </ul>

        <div class="cart-footer">
            <div class="total-row">
                <strong>Total:</strong>
                <span>₱<span id="total-price">0</span></span>
            </div>

        </div>
    </div>

    <!-- Overlay -->
    <div id="cart-overlay"
         class="cart-overlay"
         onclick="toggleCart()">
    </div>

</header>

    <!-- MAIN LAYOUT -->
    <div class="main-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h3>Categories</h3>

            <nav>
                <ul>
                    <li><a href="homepage.html">Home</a></li>
                    <li><a href="RAM.html">RAMs</a></li>
                    <li><a href="MOTHERBOARD.html">Motherboards</a></li>
                    <li><a href="PROCESSORS.html">Processors</a></li>
                    <li><a href="GPU.html">GPUs</a></li>
                    <li><a href="acc.html">Accessories</a></li>
                </ul>
            </nav>

            <h3>Filters</h3>

            <label>
                <input type="checkbox">
                In Stock
            </label>

            <label>
                <input type="checkbox">
                Cheap
            </label>

        </aside>

    <form class="Items">
        <h1 class="category-title">PROCESSOR Category</h1>
        <div class="Item-Grids">

            
            <figure>
                <img src="Processor products/Ryzen 5 5500.jpg"  alt="#">
                    <figcaption>AMD Ryzen 5 5500</figcaption>
                    <div class="price">₱5,200</div>
                    <div class="stock">Stock: 200</div>
                    <button type="button" class="btn" onclick="addToCart('AMD Ryzen 5 5500', 5200)">Add to Cart</button>
                </figure>


            <figure>
                <img src="Processor products/AMD Ryzen 7 5800X 8 Core.webp"  alt="#">
                    <figcaption>AMD Ryzen 7 5800X 8 Core</figcaption>
                    <div class="price">₱14,395</div>
                    <div class="stock">Stock: 200</div>
                    <button type="button" class="btn" onclick="addToCart('AMD Ryzen 7 5800X 8 Core', 14395)">Add to Cart</button>
                </figure>

            <figure>
                <img src="Processor products/AMD Ryzen 5 5600X 6 Core.webp" alt="#">
                    <figcaption>AMD Ryzen 5 5600X 6 Core</figcaption>
                    <div class="price">₱7,685</div>
                    <div class="stock">Stock: 800</div>
                    <button type="button" class="btn" onclick="addToCart('AMD Ryzen 5 5600X 6 Core', 7685)">Add to Cart</button>
            </figure>

            <figure>
                <img src="Processor products/Intel Core i5-12600K 3.7ghz Cpu.webp"  alt="#">
                    <figcaption>Intel Core i5-12600K 3.7ghz Cpu</figcaption>
                    <div class="price">₱8,195</div>
                    <div class="stock">Stock: 1,000</div>
                    <button type="button" class="btn" onclick="addToCart('Intel Core i5-12600K 3.7ghz Cpu', 8195)">Add to Cart</button>
            </figure>


                <figure>
                    <img src="Processor products/Intel Core i7-14700KF 3.2ghz Cpu.webp" alt="#">
                        <figcaption>Intel Core i7-14700KF 3.2ghz Cpu</figcaption>
                    <div class="price">₱19,995</div>
                    <div class="stock">Stock: 700</div>
                    <button type="button" class="btn" onclick="addToCart('Intel Core i7-14700KF 3.2ghz Cpu', 19995)">Add to Cart</button>
                </figure>
    
                <figure>
                    <img src="Processor products/Intel i9-14900K Desktop Processor.webp" alt="#">
                        <figcaption>Intel i9-14900K Desktop Processor</figcaption>
                        <div class="price">₱30,795</div>
                        <div class="stock">Stock: 200</div>
                        <button type="button" class="btn" onclick="addToCart('Intel i9-14900K Desktop Processor', 30795)">Add to Cart</button>
                </figure>
                
            
        </div>
    </form>

       
</div> </div> <footer>

</html>
