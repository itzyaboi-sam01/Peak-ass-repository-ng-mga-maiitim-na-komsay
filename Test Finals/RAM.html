<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BantayStocks LTD - Not so authorized stock checker for your Komsay needs</title>

    <link rel="icon" type="image/x-icon" href="icon1.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;700&family=Roboto:wght@100;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="itemgrids.css">
</head>

<body>

    <!-- NAVBAR -->
<header class="navbar">

    <div class="logo">
        <nav>
            <a href="homepage.html">
                <img src="logo.png" alt="BantayStocks Logo">
            </a>
        </nav>

        <p>For Komsays by Komsays</p>
    </div>

    <input type="text"
           placeholder="⌕ Search for components..."
           class="search-bar">

    <div class="nav-actions">

        <div class="login-register">
            <span class="small-text">Login or</span>
            <span class="reg">REGISTER</span>
        </div>

        <div class="divider"></div>

        <!-- CART -->
        <div class="cart">
            <img src="shoppingcart.png" alt="Cart Icon">
            <span id="cart-count">Cart</span>
        </div>

    </div>

    <!-- Sliding Cart -->
    <div id="cart-tab" class="cart-tab">
        <div class="cart-header">
            <h2>Your Shopping Cart</h2>
            <span class="close-cart" onclick="toggleCart()">CLOSE</span>
        </div>

        <ul id="cart-items-list" class="cart-items-list">
            <!-- Items injected here -->
        </ul>

        <div class="cart-footer">
            <div class="total-row">
                <strong>Total:</strong>
                <span>₱<span id="total-price">0</span></span>
            </div>


        </div>
    </div>

    <!-- Overlay -->
    <div id="cart-overlay"
         class="cart-overlay"
         onclick="toggleCart()">
    </div>

</header>

    <!-- MAIN LAYOUT -->
    <div class="main-container">

        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h3>Categories</h3>

            <nav>
                <ul>
                    <li><a href="homepage.html">Home</a></li>
                    <li><a href="RAM.html">RAMs</a></li>
                    <li><a href="MOTHERBOARD.html">Motherboards</a></li>
                    <li><a href="PROCESSORS.html">Processors</a></li>
                    <li><a href="GPU.html">GPUs</a></li>
                    <li><a href="acc.html">Accessories</a></li>
                </ul>
            </nav>

            <h3>Filters</h3>

            <label>
                <input type="checkbox">
                In Stock
            </label>

            <label>
                <input type="checkbox">
                Cheap
            </label>

        </aside>
